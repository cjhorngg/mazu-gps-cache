name: Update GPS Position

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-gps:
    runs-on: ubuntu-latest
    
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4
      
      - name: 獲取媽祖位置
        id: fetch
        run: |
          RESPONSE=$(curl -sL "https://script.google.com/macros/s/AKfycbyLtgD4OIY8aIjgu-ZCdpIwqGXl6dZ5cKw50RXG_mNxDrPSx3uqeXE8GHDqYToXAlyI/exec?action=getLocations")
          echo "data<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: 儲存為 JSON
        run: |
          mkdir -p web/data
          echo '${{ steps.fetch.outputs.data }}' > web/data/position.json
      
      - name: 提交並推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/position.json
          git diff --staged --quiet || git commit -m "更新 GPS 位置 [skip ci]"
          git push
